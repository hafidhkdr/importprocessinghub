<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Processing Hub</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Reset & full viewport */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #f1f5f9;
      font-family: 'Segoe UI', Roboto, sans-serif;
      overflow: hidden; /* hindari scroll ganda */
    }

    /* container utama full viewport */
    .app-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      padding: 1.5rem;
    }

    .glass-panel {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.04);
      padding: 1.5rem 2rem 2.5rem;
      width: 100%;
      height: 100%;
      max-width: 1600px;
      max-height: 1000px;
      display: flex;
      flex-direction: column;
    }

    /* header tetap di atas */
    .panel-header {
      flex-shrink: 0;
      padding-bottom: 1rem;
    }

    /* iframe mengambil sisa ruang */
    .iframe-wrapper {
      flex: 1;
      min-height: 0; /* penting agar flex child bisa shrink */
      border-radius: 1rem;
      overflow: hidden;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #ffffff;
    }

    /* responsif untuk layar lebih kecil */
    @media (max-width: 640px) {
      .app-wrapper {
        padding: 0.75rem;
      }
      .glass-panel {
        padding: 1rem 1rem 1.5rem;
        border-radius: 1.5rem;
      }
      .panel-header h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <div class="glass-panel">
      <!-- Header -->
      <div class="panel-header">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-2xl font-bold text-blue-600 flex items-center gap-2">
              <i class="fas fa-arrows-spin"></i> Import Processing Hub
            </h1>
            <p class="text-sm text-slate-500">Integrated Google Apps Script</p>
          </div>
        </div>
      </div>

      <!-- Iframe - akan memenuhi sisa ruang -->
      <div class="iframe-wrapper">
        <iframe src="https://script.google.com/macros/s/AKfycby1osU8VLPUYrEZPjwV-50CUuA0I5hTdWvU739ayXsABcn7JvcwxPH0KFsfHbAFVLYy/exec"></iframe>
      </div>
    </div>
  </div>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
